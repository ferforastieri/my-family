name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "deploy/cloudflare/**"
      - "Dockerfile.front"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Flutter Web
        env:
          FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_WEB_PUSH_CERTIFICATE_KEY: ${{ vars.FIREBASE_WEB_PUSH_CERTIFICATE_KEY }}
        run: |
          docker build \
            --target builder \
            --build-arg API_BASE_URL= \
            --build-arg SOCKET_URL= \
            --build-arg PUBLIC_WEB_URL= \
            --build-arg FIREBASE_API_KEY \
            --build-arg FIREBASE_APP_ID \
            --build-arg FIREBASE_MESSAGING_SENDER_ID \
            --build-arg FIREBASE_PROJECT_ID \
            --build-arg FIREBASE_AUTH_DOMAIN \
            --build-arg FIREBASE_STORAGE_BUCKET \
            --build-arg FIREBASE_WEB_PUSH_CERTIFICATE_KEY \
            --tag my-family-pages-build \
            --file Dockerfile.front \
            .
          container_id="$(docker create my-family-pages-build)"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          mkdir -p app/build
          docker cp "$container_id:/app/build/web" app/build/
          cp deploy/cloudflare/_worker.js app/build/web/_worker.js
          cp deploy/cloudflare/_routes.json app/build/web/_routes.json
          cp deploy/cloudflare/_headers app/build/web/_headers

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/build/web --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
