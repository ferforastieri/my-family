name: my_family
description: App Flutter para o projeto Nossa Familia.
publish_to: "none"
version: 0.1.4+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.4
  http: ^1.2.2
  shared_preferences: ^2.3.5
  socket_io_client: ^3.0.2
  go_router: ^17.2.3
  mix: ^2.0.3
  google_fonts: ^6.3.2
  flutter_animate: ^4.5.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^21.0.0
  image_picker: ^1.2.2
  geolocator: ^14.0.2
  battery_plus: ^7.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  fquery: ^3.0.2+1
  fquery_core: ^3.0.2
  dio: ^5.9.2
  fresh_dio: ^0.6.0
  url_launcher: ^6.3.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/family-logo.png
