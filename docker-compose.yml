services:
  mongo:
    image: mongo:7
    container_name: my-family-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-my_family}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-my-family}
    volumes:
      - mongo_data:/data/db
    ports:
      - "127.0.0.1:${MONGO_PORT:-27017}:27017"
    networks:
      - my-family-network

  redis:
    image: redis:7-alpine
    container_name: my-family-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - my-family-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: my-family-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-my_family}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-my-family}?authSource=admin
      MONGO_DB: ${MONGO_DB:-my-family}
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOAD_PATH: /data/uploads
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Nossa Familia}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL:-}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      THROTTLE_TTL_MS: ${THROTTLE_TTL_MS:?THROTTLE_TTL_MS is required}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:?THROTTLE_LIMIT is required}
      CSRF_SECRET: ${CSRF_SECRET:?CSRF_SECRET is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:?STRIPE_PRICE_ID is required}
      BILLING_SUCCESS_URL: ${BILLING_SUCCESS_URL:?BILLING_SUCCESS_URL is required}
      BILLING_CANCEL_URL: ${BILLING_CANCEL_URL:?BILLING_CANCEL_URL is required}
    volumes:
      - ${UPLOAD_HOST_PATH:?UPLOAD_HOST_PATH is required}:/data/uploads
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - my-family-network

  front:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        API_BASE_URL: ${API_BASE_URL:?API_BASE_URL is required}
        SOCKET_URL: ${SOCKET_URL:?SOCKET_URL is required}
        PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-}
        FIREBASE_API_KEY: ${FIREBASE_API_KEY:-}
        FIREBASE_APP_ID: ${FIREBASE_APP_ID:-}
        FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID:-}
        FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
        FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN:-}
        FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-}
        FIREBASE_WEB_PUSH_CERTIFICATE_KEY: ${FIREBASE_WEB_PUSH_CERTIFICATE_KEY:-}
    container_name: my-family-front
    restart: unless-stopped
    ports:
      - "${FRONT_PORT:-3458}:80"
    depends_on:
      - backend
    networks:
      - my-family-network

networks:
  my-family-network:
    driver: bridge

volumes:
  mongo_data:
