name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build and deploy on this server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker CLI
        run: |
          set -eu
          if command -v docker >/dev/null 2>&1; then
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker.io
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache docker-cli
          else
            echo "Docker CLI is not installed in the runner image"
            exit 1
          fi

      - name: Validate required secrets
        env:
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          UPLOAD_HOST_PATH: ${{ secrets.UPLOAD_HOST_PATH }}
        run: |
          set -eu
          test -n "$MONGO_ROOT_PASSWORD" || { echo "Missing secret MONGO_ROOT_PASSWORD"; exit 1; }
          test -n "$JWT_SECRET" || { echo "Missing secret JWT_SECRET"; exit 1; }
          test -n "$UPLOAD_HOST_PATH" || { echo "Missing secret UPLOAD_HOST_PATH"; exit 1; }

      - name: Create deploy environment
        env:
          MONGO_ROOT_USER: ${{ secrets.MONGO_ROOT_USER }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          FRONT_PORT: ${{ secrets.FRONT_PORT }}
          MONGO_PORT: ${{ secrets.MONGO_PORT }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SOCKET_URL: ${{ secrets.SOCKET_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          PASSWORD_RESET_URL: ${{ secrets.PASSWORD_RESET_URL }}
          FIREBASE_SERVICE_ACCOUNT_PATH: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATH }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_WEB_PUSH_CERTIFICATE_KEY: ${{ secrets.FIREBASE_WEB_PUSH_CERTIFICATE_KEY }}
          UPLOAD_HOST_PATH: ${{ secrets.UPLOAD_HOST_PATH }}
        run: |
          set -eu
          umask 077
          {
            printf 'MONGO_ROOT_USER=%s\n' "${MONGO_ROOT_USER:-my_family}"
            printf 'MONGO_ROOT_PASSWORD=%s\n' "$MONGO_ROOT_PASSWORD"
            printf 'MONGO_DB=%s\n' "${MONGO_DB:-my-family}"
            printf 'BACKEND_PORT=%s\n' "${BACKEND_PORT:-3459}"
            printf 'FRONT_PORT=%s\n' "${FRONT_PORT:-3458}"
            printf 'MONGO_PORT=%s\n' "${MONGO_PORT:-27019}"
            printf 'REDIS_PORT=%s\n' "${REDIS_PORT:-6389}"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'JWT_EXPIRES_IN=%s\n' "${JWT_EXPIRES_IN:-7d}"
            printf 'CORS_ORIGIN=%s\n' "${CORS_ORIGIN:-*}"
            printf 'API_BASE_URL=%s\n' "${API_BASE_URL:-http://localhost:3459/api}"
            printf 'SOCKET_URL=%s\n' "${SOCKET_URL:-http://localhost:3459}"
            printf 'SMTP_HOST=%s\n' "${SMTP_HOST:-}"
            printf 'SMTP_PORT=%s\n' "${SMTP_PORT:-587}"
            printf 'SMTP_USER=%s\n' "${SMTP_USER:-}"
            printf 'SMTP_PASS=%s\n' "${SMTP_PASS:-}"
            printf 'EMAIL_FROM=%s\n' "${EMAIL_FROM:-}"
            printf 'EMAIL_FROM_NAME="%s"\n' "${EMAIL_FROM_NAME:-Nossa Familia}"
            printf 'PASSWORD_RESET_URL=%s\n' "${PASSWORD_RESET_URL:-}"
            printf 'FIREBASE_SERVICE_ACCOUNT_PATH=%s\n' "${FIREBASE_SERVICE_ACCOUNT_PATH:-}"
            printf 'FIREBASE_SERVICE_ACCOUNT_JSON=%s\n' "${FIREBASE_SERVICE_ACCOUNT_JSON:-}"
            printf 'FIREBASE_API_KEY=%s\n' "${FIREBASE_API_KEY:-}"
            printf 'FIREBASE_APP_ID=%s\n' "${FIREBASE_APP_ID:-}"
            printf 'FIREBASE_MESSAGING_SENDER_ID=%s\n' "${FIREBASE_MESSAGING_SENDER_ID:-}"
            printf 'FIREBASE_PROJECT_ID=%s\n' "${FIREBASE_PROJECT_ID:-}"
            printf 'FIREBASE_AUTH_DOMAIN=%s\n' "${FIREBASE_AUTH_DOMAIN:-}"
            printf 'FIREBASE_STORAGE_BUCKET=%s\n' "${FIREBASE_STORAGE_BUCKET:-}"
            printf 'FIREBASE_WEB_PUSH_CERTIFICATE_KEY=%s\n' "${FIREBASE_WEB_PUSH_CERTIFICATE_KEY:-}"
            printf 'UPLOAD_HOST_PATH=%s\n' "$UPLOAD_HOST_PATH"
          } > .env

      - name: Build Android APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SOCKET_URL: ${{ secrets.SOCKET_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_WEB_PUSH_CERTIFICATE_KEY: ${{ secrets.FIREBASE_WEB_PUSH_CERTIFICATE_KEY }}
        run: |
          set -eu
          docker run --rm \
            -v "$PWD/app:/app" \
            -w /app \
            ghcr.io/cirruslabs/flutter:stable \
            flutter build apk --release \
              --dart-define=API_BASE_URL="${API_BASE_URL:-http://localhost:3459/api}" \
              --dart-define=SOCKET_URL="${SOCKET_URL:-http://localhost:3459}" \
              --dart-define=FIREBASE_API_KEY="${FIREBASE_API_KEY:-}" \
              --dart-define=FIREBASE_APP_ID="${FIREBASE_APP_ID:-}" \
              --dart-define=FIREBASE_MESSAGING_SENDER_ID="${FIREBASE_MESSAGING_SENDER_ID:-}" \
              --dart-define=FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID:-}" \
              --dart-define=FIREBASE_AUTH_DOMAIN="${FIREBASE_AUTH_DOMAIN:-}" \
              --dart-define=FIREBASE_STORAGE_BUCKET="${FIREBASE_STORAGE_BUCKET:-}" \
              --dart-define=FIREBASE_WEB_PUSH_CERTIFICATE_KEY="${FIREBASE_WEB_PUSH_CERTIFICATE_KEY:-}"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: my-family-android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy containers
        run: |
          set -eu
          export DOCKER_CONFIG="$PWD/.docker"
          mkdir -p "$DOCKER_CONFIG"

          if docker compose version >/dev/null 2>&1 && docker compose --env-file .env -f docker-compose.yml config >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1 && docker-compose --env-file .env -f docker-compose.yml config >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "Docker Compose is not configured in the runner/server"
            exit 1
          fi

          export COMPOSE_PROJECT_NAME=my-family
          $COMPOSE --env-file .env build --pull
          $COMPOSE --env-file .env up -d mongo redis
          $COMPOSE --env-file .env up -d --remove-orphans
          $COMPOSE --env-file .env ps
