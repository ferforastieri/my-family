# Copie para docker-compose.yml e preencha senhas/caminhos.
# LovePage: front 3458, backend 3459, postgres 5436 (Atacte usa 3456, 3457, 5435).
services:
  postgres:
    image: postgres:15-alpine
    container_name: lovepage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: family
      POSTGRES_USER: lovepage_usuario
      POSTGRES_PASSWORD: sua_senha_postgres
    ports:
      - "5436:5432"
    volumes:
      - lovepage_postgres_data:/var/lib/postgresql/data
    networks:
      - lovepage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovepage_usuario -d family"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lovepage-redis
    restart: unless-stopped
    networks:
      - lovepage-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lovepage-backend
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://lovepage_usuario:sua_senha_postgres@postgres:5432/family?sslmode=disable
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "*"
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3459:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lovepage-network

  front:
    build:
      context: .
      dockerfile: Dockerfile.front
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3459/api}
    container_name: lovepage-front
    restart: unless-stopped
    ports:
      - "3458:80"
    depends_on:
      - backend
    networks:
      - lovepage-network

networks:
  lovepage-network:
    driver: bridge

volumes:
  lovepage_postgres_data:
